<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<html lang="en">
<head>
    <!-- <meta charset="UTF-8"> -->
    <title>Login Page</title>
    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #dfe6ee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-box{
            background: #f5f7fb;
            padding: 40px;
            width: 600px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom: 30px;
        }

        .login-box{
            background: white;
            padding: 25px;
            width: 280px;
            margin: auto;
            border-radius: 6px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .login-box h3{
            margin-bottom: 20px;
        }

        label{
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            background: #2f6fb2;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover{
            background: #245a92;
        }

        .register{
            margin-top: 15px;
            font-size: 13px;
        }

        .register a{
            color: #2f6fb2;
            text-decoration: none;
        }

    </style>
</head>
<body>

<div class="main-box">

    <h2>Login Page</h2>

    <h3>Personal Finance Tracker</h3>

    <div class="login-box">
        {% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}

        <form method="POST">
{% csrf_token %}

<label>Email</label>
<input type="email" name="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" name="password" placeholder="Enter Password">

<button type="submit">Login</button>

<div class="register">
Don't have an account? <a href="{% url 'signup' %}">Register</a>
</div>

</form>

    </div>

</div>

</body>
</html>
